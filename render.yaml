services:
  - type: web
    name: mainstreet
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://mainstreet.onrender.com
      - key: APP_URL
        value: https://mainstreet.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mainstreet-db
          property: connectionString

databases:
  - name: mainstreet-db
    plan: free
