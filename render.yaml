services:
  - type: web
    name: mainstreet
    runtime: node
    plan: starter
    buildCommand: npm install && cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: mainstreet-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/mainstreet.db
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      # ── Email (SendGrid SMTP). Fill these in via the Render dashboard.
      # Without them, emails are logged to server stdout instead of sent.
      - key: SMTP_HOST
        sync: false        # set to: smtp.sendgrid.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false        # set to literal string: apikey
      - key: SMTP_PASS
        sync: false        # set to your SendGrid API key (starts with SG.)
      - key: EMAIL_FROM
        sync: false        # e.g. MainStreet <you@example.com> — must match verified sender
      - key: APP_URL
        sync: false        # e.g. https://mainstreet.onrender.com (used in email links)
